<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Chart | Arunachal Pradesh Lokayukta</title>
    <meta name="description" content="Organization structure of the Arunachal Pradesh Lokayukta.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://lokayukta.arunachal.gov.in/images/favicon.ico" type="image/x-icon">
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
    <script src="app.js" defer></script>
</head>
<body>
    <div id="navbar-container"></div>
    <div class="spacer"></div>

    <div class="page-header">
        <h1>Organization Chart</h1>
        <p>Structure of the Arunachal Pradesh Lokayukta</p>
        <div class="breadcrumb">
            <a href="index.html">Home</a> <span>/</span> <span>About Us</span> <span>/</span> <span>Organization Chart</span>
        </div>
    </div>

    <div class="container">
        <div class="content-section fade-in" style="text-align: center;">
            <div class="section-label">Structure</div>
            <h2 class="section-title">Organizational Hierarchy</h2>
            <div class="section-divider" style="margin-left: auto; margin-right: auto;"></div>

            <div class="org-chart" style="margin-top: 2.5rem;">
                <!-- Chairperson -->
                <div class="org-node primary">
                    <h4 style="font-family: 'Inter', sans-serif; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8;">Chairperson</h4>
                    <p style="font-weight: 600; margin-top: 0.25rem;">Justice Prasanta Kumar Deka (Retd)</p>
                </div>
                <div class="org-connector"></div>

                <!-- Member -->
                <div class="org-node">
                    <h4 style="font-family: 'Inter', sans-serif; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--clr-primary);">Member</h4>
                    <p style="font-weight: 600; margin-top: 0.25rem; color: var(--text-heading);">Er. Sang Phuntsok, IAS (Retd)</p>
                </div>
                <div class="org-connector"></div>

                <!-- Secretary -->
                <div class="org-node">
                    <h4 style="font-family: 'Inter', sans-serif; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--clr-primary);">Secretary</h4>
                    <p style="font-weight: 600; margin-top: 0.25rem; color: var(--text-heading);">Ms Sumedha, APCS</p>
                </div>
            </div>

        </div>
    </div>

    <div id="footer-container"></div>
</body>
</html>
