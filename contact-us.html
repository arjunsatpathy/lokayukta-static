<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Arunachal Pradesh Lokayukta</title>
    <meta name="description" content="Contact the Arunachal Pradesh Lokayukta — phone, email, and office address.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://lokayukta.arunachal.gov.in/images/favicon.ico" type="image/x-icon">
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
    <script src="app.js" defer></script>
</head>
<body>
    <div id="navbar-container"></div>
    <div class="spacer"></div>

    <div class="page-header">
        <h1>Contact Us</h1>
        <p>Get in touch with the Lokayukta office</p>
        <div class="breadcrumb">
            <a href="index.html">Home</a> <span>/</span> <span>Contact</span> <span>/</span> <span>Contact Us</span>
        </div>
    </div>

    <div class="container">
        <div class="contact-grid fade-in">
            <div class="content-section">
                <div class="section-label">Get in Touch</div>
                <h2 class="section-title">Reach Us</h2>
                <div class="section-divider"></div>

                <div style="display: flex; flex-direction: column; gap: 1.5rem; margin-top: 1rem;">
                    <div class="contact-info-card">
                        <div class="contact-icon">T</div>
                        <div>
                            <h4 style="font-family: 'Inter', sans-serif; font-weight: 700; margin-bottom: 0.25rem;">Call Us</h4>
                            <p style="color: var(--text-muted); margin: 0;">To be updated</p>
                        </div>
                    </div>
                    <div class="contact-info-card">
                        <div class="contact-icon">@</div>
                        <div>
                            <h4 style="font-family: 'Inter', sans-serif; font-weight: 700; margin-bottom: 0.25rem;">Email Us</h4>
                            <p style="color: var(--text-muted); margin: 0;">To be updated</p>
                        </div>
                    </div>
                    <div class="contact-info-card">
                        <div class="contact-icon">A</div>
                        <div>
                            <h4 style="font-family: 'Inter', sans-serif; font-weight: 700; margin-bottom: 0.25rem;">Visit Us</h4>
                            <p style="color: var(--text-muted); margin: 0;">Officer's Apartment, Zoo Road, Tower-1,<br>Itanagar, Arunachal Pradesh — 791113</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="content-section">
                <div class="section-label">Location</div>
                <h2 class="section-title">Find Us</h2>
                <div class="section-divider"></div>
                <div style="border-radius: var(--radius-md); overflow: hidden; margin-top: 1rem; box-shadow: var(--shadow-md);">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3549.123456789!2d93.6!3d27.1!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2sItanagar%2C+Arunachal+Pradesh!5e0!3m2!1sen!2sin!4v1234567890"
                        width="100%" 
                        height="350" 
                        style="border:0;" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade"
                        title="Office Location Map">
                    </iframe>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>
</body>
</html>
